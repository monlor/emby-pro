name: Build Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:
    inputs:
      emby_tag:
        description: "Optional linuxserver/emby tag to build against"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      emby_tag: ${{ steps.vars.outputs.emby_tag }}
      tags: ${{ steps.vars.outputs.tags }}
      primary_tag: ${{ steps.vars.outputs.primary_tag }}

    steps:
      - name: Resolve build settings
        id: vars
        env:
          INPUT_EMBY_TAG: ${{ github.event.inputs.emby_tag }}
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          ref_name="${GITHUB_REF_NAME}"
          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          emby_tag="latest"
          tags=()

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              tags+=("${image}:pr-${short_sha}")
              ;;
            workflow_dispatch)
              if [ -n "${INPUT_EMBY_TAG}" ]; then
                emby_tag="${INPUT_EMBY_TAG}"
                tags+=("${image}:${emby_tag}" "${image}:latest")
              else
                tags+=("${image}:latest" "${image}:sha-${short_sha}")
              fi
              ;;
            push)
              if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
                emby_tag="${ref_name}"
                tags+=("${image}:${emby_tag}" "${image}:latest")
              else
                tags+=("${image}:latest" "${image}:sha-${short_sha}")
              fi
              ;;
            *)
              tags+=("${image}:latest")
              ;;
          esac

          {
            echo "emby_tag=${emby_tag}"
            echo "primary_tag=${tags[0]}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            EMBY_TAG=${{ needs.prepare.outputs.emby_tag }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.arch }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Build
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            EMBY_TAG=${{ needs.prepare.outputs.emby_tag }}
          platforms: ${{ matrix.platform }}
          push: false
          tags: ${{ needs.prepare.outputs.tags }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.arch }}

  merge:
    name: Merge manifest
    if: github.event_name != 'pull_request'
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAGS: ${{ needs.prepare.outputs.tags }}
        run: |
          set -euo pipefail

          tag_args=()
          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            tag_args+=("-t" "${tag}")
          done <<< "${TAGS}"

          source_args=()
          for digest_file in "${RUNNER_TEMP}"/digests/*; do
            digest="$(basename "${digest_file}")"
            source_args+=("${IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${source_args[@]}"

      - name: Inspect image
        run: docker buildx imagetools inspect "${{ needs.prepare.outputs.primary_tag }}"
