services:
  emby-pro:
    build:
      context: .
      dockerfile: Dockerfile
    image: emby-pro:local
    container_name: emby-pro-local
    restart: unless-stopped
    environment:
      # Runtime business config now lives in /config/app.yml.
      PUID: ${PUID:-501}
      PGID: ${PGID:-20}
      TZ: ${TZ:-Asia/Shanghai}

    ports:
      # Access Emby Web and redirect/proxy traffic through the local redirect port.
      - "28096:28096"

    volumes:
      - ${DEV_CONFIG_DIR:-./.dev/config}:/config
      - ${DEV_STRM_DIR:-./.dev/strm}:/strm
