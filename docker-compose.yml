services:
  emby-pro:
    # Pin a followed upstream tag here for reproducible upgrades, for example:
    # image: ghcr.io/monlor/emby-pro:4.8.11.0-ls258
    image: ghcr.io/monlor/emby-pro:latest
    container_name: emby-pro
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Shanghai
      OPENLIST_BASE_URL: https://list.example.com
      # Optional: if emby-pro reaches OpenList via LAN but clients need a public download URL.
      # OPENLIST_PUBLIC_URL: https://list-public.example.com
      OPENLIST_USERNAME: your-openlist-user
      OPENLIST_PASSWORD: your-openlist-password
      OPENLIST_DIRECT_PLAY: "true"
      OPENLIST_PATHS: /movies,/tv
      PLAY_TICKET_TTL: 12h
      # 快速选择同步档位：conservative / balanced / aggressive。
      STRM_SYNC_PROFILE: conservative
      # 如需局部覆盖 profile，再单独打开下面的变量；这些限流只作用于 .strm 同步扫描。
      # OPENLIST_RATE_LIMIT_QPS: "0.2"
      # OPENLIST_RATE_LIMIT_BURST: "1"
      # STRM_FULL_RESCAN_INTERVAL: 24h
      # STRM_MAX_DIRS_PER_CYCLE: "20"
      # STRM_MAX_REQUESTS_PER_CYCLE: "60"
    ports:
      - "8096:8096"
      - "28096:28096"
    volumes:
      - ./config:/config
      - ./strm:/strm
